<!DOCTYPE html>
<html>
<head>
<style>
@page { size: A4; margin: 25mm 20mm; }
p { font-size: 11pt; margin-bottom: 4mm; }
.generated { color: #0066cc; font-style: italic; }
</style>
<script>
var items = ['Alpha', 'Bravo', 'Charlie', 'Delta'];
var html = '<h2>Generated Content</h2>';
html += '<p class="generated">This content was generated by JavaScript execution before layout.</p>';
html += '<ul>';
for (var i = 0; i < items.length; i++) {
    html += '<li>' + items[i] + '</li>';
}
html += '</ul>';
html += '<p class="generated">Total items: ' + items.length + '</p>';
document.write(html);
</script>
</head>
<body>
<h1>JavaScript Test</h1>
<p>This paragraph is from static HTML.</p>
</body>
</html>
